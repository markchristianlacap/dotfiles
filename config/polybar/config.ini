[colors]
background = #80000000
background-alt = #80000000
foreground = #bfFFFFFF
primary = ${colors.foreground}
secondary = ${colors.foreground}
warning = #FFA500
blue = #1363DF
alert = #A54242
disabled = #80FFFFFF

[global/wm]
include-directory = ./modules

[bar/top]
width = 100%
height = 20pt
radius = 0

; dpi = 96
monitor = eDP1
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = "|" 
separator-foreground = ${colors.disabled}

font-0 = Iosevka Nerd Font;2

modules-left = bspwm xwindow
modules-center = date
modules-right = battery pulseaudio memory cpu temperature wlan eth bluetooth logout restart poweroff

fixed-center = true

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;tray-position = left

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
